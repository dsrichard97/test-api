name: Scheduled Stock Data Fetch

on:
  workflow_dispatch: # Allows manual testing from the Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Cleaned up: No more jupyter, nbconvert, or ipykernel needed!
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    # Runs natively and cleanly via Python
    - name: Run Data Fetch Script
      env:
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      run: |
        python data/fetch_data.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/stock_data.json
        git diff-index --quiet HEAD || git commit -m "Automated data update: $(date)"
        git push
